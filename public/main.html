<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nikita.gg - Cheat Menu</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="cheat-container">
        <div class="cheat-header">
            <div class="brand">
                <i class="fas fa-lock lock-icon"></i>
                <span class="brand-name">nikita.gg</span>
            </div>
            <div class="user-info" id="userInfo">
                <span id="username">User</span>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>

        <div class="cheat-content">
            <div class="status-card">
                <div class="status-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Status: <strong>Injected</strong></span>
                </div>
                <div class="status-item">
                    <i class="fas fa-key"></i>
                    <span>License: <strong id="licenseKey">*****-*****</strong></span>
                </div>
            </div>

            <div class="features-grid">
                <div class="feature-card">
                    <i class="fas fa-bullseye"></i>
                    <h3>Aimbot</h3>
                    <p>Advanced aim assistance with customizable settings</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-eye"></i>
                    <h3>Visuals</h3>
                    <p>ESP, Chams, and other visual enhancements</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-bolt"></i>
                    <h3>Triggerbot</h3>
                    <p>Automatic shooting when target is detected</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-crosshairs"></i>
                    <h3>Silent Aim</h3>
                    <p>Undetectable aim manipulation</p>
                </div>
            </div>

            <div class="actions">
                <button class="inject-btn" id="injectBtn">
                    <i class="fas fa-play"></i>
                    <span>Inject to FiveM</span>
                </button>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
