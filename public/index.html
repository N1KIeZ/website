<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nikita.gg — License Activation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="brand">
            <div class="brand-icon">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1>nikita.gg</h1>
            <p>License Activation</p>
        </div>

        <div id="activate-view">
            <div class="card">
                <div class="card-header">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--turquoise)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span class="card-title">Activate Your License</span>
                </div>

                <div id="result" class="result-box"></div>

                <div class="field">
                    <div class="field-label">
                        <label>License Key</label>
                        <span class="field-hint">Paste your key from Keygen</span>
                    </div>
                    <div class="input-wrap">
                        <input type="text" id="key-input" placeholder="XXXXX-XXXXX-XXXXX-XXXXX-XXXXX-..." autocomplete="off" spellcheck="false">
                    </div>
                </div>

                <button class="btn btn-primary btn-block" id="activate-btn" onclick="doActivate()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    Activate
                </button>

                <div class="hwid-display">
                    <span>HWID</span> <span id="hwid-value"></span>
                </div>
            </div>

            <div class="card" style="padding:20px 32px;">
                <div style="display:flex;justify-content:space-between;align-items:center;font-size:12.5px;">
                    <span style="color:var(--text-dim);">Have a saved license?</span>
                    <button class="btn btn-secondary btn-sm" onclick="checkSavedLicense()">Check Status</button>
                </div>
            </div>
        </div>

        <div id="status-view" class="hidden">
            <div class="card">
                <div class="card-header">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--turquoise)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                    <span class="card-title">License Status</span>
                </div>
                <div id="license-details"></div>
                <div style="margin-top:20px;">
                    <button class="btn btn-secondary btn-block" onclick="showActivateView()">Activate Another Key</button>
                </div>
            </div>
        </div>

        <div class="footer">nikita.gg &middot; asymmetric license system</div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/hwid.js"></script>
    <script src="js/key-system.js"></script>
    <script>
        var LS_KEY = 'license_key';
        var LS_STATUS = 'license_status';

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('hwid-value').textContent = HWID.get();
            document.getElementById('key-input').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') doActivate();
            });
            var saved = localStorage.getItem(LS_KEY);
            if (saved) checkSavedLicense();
        });

        function showToast(msg, type) {
            var c = document.getElementById('toast-container');
            var t = document.createElement('div');
            t.className = 'toast toast-' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(function () { t.remove(); }, 3500);
        }

        function setResult(msg, type, icon) {
            var el = document.getElementById('result');
            el.className = 'result-box visible ' + type;
            var icons = {
                success: '<svg class="result-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M16 8l-6 6-4-4"/></svg>',
                error: '<svg class="result-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
                warning: '<svg class="result-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
            };
            el.innerHTML = (icons[type] || '') + '<span class="result-text">' + msg + '</span>';
        }

        function clearResult() {
            document.getElementById('result').className = 'result-box';
        }

        function showActivateView() {
            document.getElementById('activate-view').classList.remove('hidden');
            document.getElementById('status-view').classList.add('hidden');
            clearResult();
        }

        async function doActivate() {
            var input = document.getElementById('key-input');
            var key = input.value.trim().toUpperCase();
            if (!key) {
                setResult('Please enter a license key', 'error');
                input.focus();
                return;
            }

            var btn = document.getElementById('activate-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;margin:0;"></div> Validating...';
            clearResult();

            try {
                var result = await KeySystem.validateKey(key, HWID.get());

                if (result.valid) {
                    localStorage.setItem(LS_KEY, key);
                    localStorage.setItem(LS_STATUS, JSON.stringify(result));
                    setResult(result.message || 'License activated successfully', 'success');
                    showToast('License activated', 'success');
                    input.value = '';
                    setTimeout(showLicenseStatus, 800);
                } else {
                    setResult(result.message || 'Activation failed', 'error');
                    showToast(result.message || 'Activation failed', 'error');
                    input.classList.add('error');
                    setTimeout(function () { input.classList.remove('error'); }, 2000);
                }
            } catch (e) {
                setResult('Server unreachable. Is the backend running?', 'error');
                showToast('Connection failed', 'error');
            }

            btn.disabled = false;
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Activate';
        }

        function showLicenseStatus() {
            document.getElementById('activate-view').classList.add('hidden');
            document.getElementById('status-view').classList.remove('hidden');

            var key = localStorage.getItem(LS_KEY) || 'Unknown';
            var status = localStorage.getItem(LS_STATUS);
            var data = null;
            try { data = JSON.parse(status); } catch (_) {}

            var statusText = data && data.valid ? 'Active' : 'Unknown';
            var statusColor = data && data.valid ? 'var(--turquoise)' : 'var(--text-dim)';

            var html = [
                '<div class="result-box visible info" style="margin-bottom:20px;">',
                '<svg class="result-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>',
                '<span class="result-text">Your license is <strong style="color:' + statusColor + '">' + statusText + '</strong></span>',
                '</div>',
                '<div class="info-row"><span class="info-label">License Key</span><span class="info-value" style="font-size:11px;">' + key + '</span></div>',
                '<div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:' + statusColor + ';">' + statusText + '</span></div>',
                '<div class="info-row"><span class="info-label">HWID</span><span class="info-value">' + HWID.get() + '</span></div>',
            ];
            document.getElementById('license-details').innerHTML = html.join('');
        }

        async function checkSavedLicense() {
            var saved = localStorage.getItem(LS_KEY);
            if (!saved) {
                showToast('No saved license found', 'info');
                return;
            }
            try {
                var result = await KeySystem.validateKey(saved, HWID.get());
                if (result.valid) {
                    localStorage.setItem(LS_STATUS, JSON.stringify(result));
                    showLicenseStatus();
                    showToast('License is valid', 'success');
                } else {
                    localStorage.removeItem(LS_KEY);
                    localStorage.removeItem(LS_STATUS);
                    showToast('License no longer valid', 'error');
                    showActivateView();
                }
            } catch (e) {
                showToast('Server unreachable', 'error');
            }
        }
    </script>
</body>
</html>
